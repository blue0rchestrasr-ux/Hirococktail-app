<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0804">
<title>BAR Musashi — お名前カクテル</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Serif+JP:wght@200;300;400&display=swap');

*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#0a0804;font-family:'Cormorant Garamond','Noto Serif JP',serif;color:#e8dcc8;min-height:100vh;-webkit-font-smoothing:antialiased}

.app{min-height:100vh;display:flex;flex-direction:column;align-items:center;
  background:radial-gradient(ellipse at 20% 50%,rgba(120,80,20,.12) 0%,transparent 60%),
  radial-gradient(ellipse at 80% 20%,rgba(180,130,40,.08) 0%,transparent 50%),
  radial-gradient(ellipse at 50% 100%,rgba(90,60,15,.06) 0%,transparent 40%),#0a0804;
  padding:56px 24px 80px}

.header{text-align:center;margin-bottom:52px;animation:fadeDown 1s ease forwards}
@keyframes fadeDown{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}
.logo-wrap{width:clamp(120px,28vw,180px);margin:0 auto 20px;background:#0a0804;border-radius:4px;overflow:hidden;line-height:0}
.logo-wrap img{width:100%;height:auto;display:block;mix-blend-mode:lighten}
.bar-label{font-size:10px;letter-spacing:.4em;color:#b8965a;text-transform:uppercase;margin-bottom:20px;opacity:.85}
.title{font-size:clamp(34px,6vw,60px);font-weight:300;color:#f0e4c8;letter-spacing:.08em;line-height:1.15;margin-bottom:8px}
.title em{font-style:italic;color:#c8a060}
.subtitle{font-size:13px;letter-spacing:.25em;color:#6a5c44;font-weight:300}
.divider{width:64px;height:1px;background:linear-gradient(90deg,transparent,#b8965a80,transparent);margin:22px auto}

.key-section{width:100%;max-width:500px;margin-bottom:20px;animation:fadeIn .8s .2s ease both}
.key-row{display:flex;gap:0;border:1px solid rgba(184,150,90,.15);background:rgba(255,255,255,.01)}
.key-input{flex:1;background:transparent;border:none;outline:none;padding:12px 16px;font-family:monospace;font-size:12px;color:#b8965a;letter-spacing:.02em;min-width:0}
.key-input::placeholder{color:rgba(184,150,90,.2)}
.key-status{padding:12px 14px;font-size:9px;letter-spacing:.15em;color:#6a5c44;white-space:nowrap;display:flex;align-items:center}
.key-status.ok{color:#6a8a5a}
.key-hint{font-size:10px;color:#4a3e2c;letter-spacing:.1em;margin-top:6px;text-align:center}
.key-hint a{color:#b8965a80;text-decoration:none}
.key-hint a:hover{color:#b8965a}

.input-section{width:100%;max-width:500px;margin-bottom:48px;animation:fadeIn .8s .4s ease both}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.input-label{display:block;font-size:10px;letter-spacing:.35em;color:#b8965a;text-transform:uppercase;margin-bottom:10px}
.input-wrap{display:flex;border:1px solid rgba(184,150,90,.25);background:rgba(255,255,255,.015);transition:border-color .4s,box-shadow .4s}
.input-wrap:focus-within{border-color:rgba(184,150,90,.6);box-shadow:0 0 28px rgba(184,150,90,.06)}
.name-input{flex:1;background:transparent;border:none;outline:none;padding:17px 20px;font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;color:#f0e4c8;letter-spacing:.05em;min-width:0}
.name-input::placeholder{color:rgba(184,150,90,.25);font-style:italic}
.gen-btn{padding:17px 28px;background:transparent;border:none;border-left:1px solid rgba(184,150,90,.25);color:#b8965a;font-family:'Cormorant Garamond',serif;font-size:10px;letter-spacing:.3em;text-transform:uppercase;cursor:pointer;transition:all .3s;white-space:nowrap}
.gen-btn:hover:not(:disabled){background:rgba(184,150,90,.08);color:#d4b070}
.gen-btn:disabled{opacity:.35;cursor:not-allowed}

.loading{display:flex;flex-direction:column;align-items:center;gap:26px;padding:60px 0}
.pour-wrap{position:relative;width:48px;height:66px}
.pour-glass{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:28px;height:36px;border:1px solid rgba(184,150,90,.35);border-top:none;border-radius:0 0 4px 4px;overflow:hidden}
.pour-fill{position:absolute;bottom:0;width:100%;background:linear-gradient(to top,rgba(184,150,90,.5),rgba(200,160,96,.2));animation:fillUp 2s ease-in-out infinite}
@keyframes fillUp{0%{height:0}60%{height:85%}80%{height:85%}100%{height:0}}
.pour-drop{position:absolute;top:0;left:50%;width:2px;background:linear-gradient(to bottom,transparent,rgba(184,150,90,.6));animation:drip 2s ease-in-out infinite}
@keyframes drip{0%{height:0;transform:translateX(-50%);opacity:1}50%{height:24px;opacity:1}60%{height:24px;opacity:0}100%{height:0;opacity:0}}
.load-text{font-size:12px;letter-spacing:.25em;color:#7a6b52;animation:pulse 1.6s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}

.card{width:100%;max-width:560px;border:1px solid rgba(184,150,90,.2);
  background:linear-gradient(145deg,rgba(255,255,255,.02),transparent 60%),rgba(12,10,6,.8);
  padding:48px 44px;animation:cardUp .7s cubic-bezier(.22,1,.36,1) forwards;position:relative;overflow:hidden;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
@keyframes cardUp{from{opacity:0;transform:translateY(26px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
.shimmer{position:absolute;top:0;left:-100%;height:1px;width:200%;background:linear-gradient(90deg,transparent 25%,#b8965a60 50%,transparent 75%);animation:shim 3s ease-in-out .5s}
@keyframes shim{from{transform:translateX(-50%)}to{transform:translateX(50%)}}
.corner{position:absolute;width:18px;height:18px}
.corner.tl{top:14px;left:14px;border-top:1px solid rgba(184,150,90,.25);border-left:1px solid rgba(184,150,90,.25)}
.corner.br{bottom:14px;right:14px;border-bottom:1px solid rgba(184,150,90,.25);border-right:1px solid rgba(184,150,90,.25)}
.card-for{font-size:9px;letter-spacing:.45em;color:#6a5c44;text-transform:uppercase;margin-bottom:4px}
.card-name{font-size:28px;font-weight:300;color:#c8a060;letter-spacing:.08em;margin-bottom:30px;font-style:italic}
.cocktail-name{font-size:clamp(30px,5vw,50px);font-weight:300;color:#f0e4c8;letter-spacing:.04em;line-height:1.15;margin-bottom:6px}
.cocktail-jp{font-size:14px;letter-spacing:.3em;color:#b8965a;margin-bottom:30px;font-family:'Noto Serif JP',serif;font-weight:200}
.card-div{width:100%;height:1px;background:linear-gradient(90deg,transparent,rgba(184,150,90,.2),transparent);margin:24px 0}
.sec-title{font-size:8px;letter-spacing:.5em;color:#6a5c44;text-transform:uppercase;margin-bottom:10px}
.ing-list{list-style:none;display:flex;flex-wrap:wrap;gap:7px;padding:0}
.ing-tag{padding:5px 14px;border:1px solid rgba(184,150,90,.2);font-size:13px;color:#c0aa80;letter-spacing:.06em;background:rgba(184,150,90,.03)}
.desc{font-size:16px;line-height:1.85;color:#b8a888;font-weight:300;font-style:italic;letter-spacing:.02em}
.glass-row{display:flex;gap:30px;flex-wrap:wrap}
.meta-item{display:flex;flex-direction:column;gap:3px}
.meta-label{font-size:8px;letter-spacing:.4em;color:#6a5c44;text-transform:uppercase}
.meta-val{font-size:15px;color:#dcc8a0;letter-spacing:.05em}
.garnish{font-size:13px;color:#8a7a5e;letter-spacing:.06em;font-style:italic;margin-top:14px}
.garnish-icon{color:#b8965a;margin-right:7px}

.error{color:#b87060;font-size:12px;letter-spacing:.12em;text-align:center;padding:18px 24px;border:1px solid rgba(184,112,96,.2);background:rgba(184,112,96,.04);max-width:500px;width:100%;line-height:1.7}
.retry-btn{display:inline-block;margin-top:12px;padding:7px 18px;background:transparent;border:1px solid rgba(184,112,96,.3);color:#b87060;font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:.2em;text-transform:uppercase;cursor:pointer}
.retry-btn:hover{background:rgba(184,112,96,.08)}

.history{width:100%;max-width:560px;margin-top:48px}
.hist-title{font-size:9px;letter-spacing:.45em;color:#4a3e2c;text-transform:uppercase;margin-bottom:14px;text-align:center}
.hist-item{display:flex;justify-content:space-between;align-items:baseline;padding:12px 0;border-bottom:1px solid rgba(184,150,90,.06);cursor:pointer;transition:all .25s;gap:12px}
.hist-item:hover{padding-left:8px}
.hist-name{font-size:12px;color:#6a5c44;letter-spacing:.12em;white-space:nowrap}
.hist-cocktail{font-size:15px;color:#a8946c;letter-spacing:.04em;font-style:italic;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.footer{margin-top:60px;text-align:center;opacity:.25}
.footer p{font-size:9px;letter-spacing:.4em;color:#6a5c44;text-transform:uppercase}

.hidden{display:none}
@media(max-width:480px){.app{padding:36px 16px 60px}.card{padding:34px 24px}.glass-row{gap:22px}}
</style>
</head>

  function safeParseJSON(raw) {
    var s = raw.replace(/```(?:json)?\s*/gi, '').replace(/```\s*/g, '').trim();
    var start = s.indexOf('{');
    var end = s.lastIndexOf('}');
    if (start < 0 || end <= start) return null;
    var block = s.substring(start, end + 1);
    try { return JSON.parse(block); } catch(e) {}
    var fixed = block.replace(/\r\n/g, '\\n').replace(/\r/g, '\\n').replace(/\n/g, '\\n').replace(/\t/g, '\\t');
    try { return JSON.parse(fixed); } catch(e) {}
    var oneline = block.split('\n').map(function(line) { return line.trim(); }).join('');
    try { return JSON.parse(oneline); } catch(e) {}
    var noTrail = oneline.replace(/,\s*}/g, '}').replace(/,\s*]/g, ']');
    try { return JSON.parse(noTrail); } catch(e) {}
    var noCtrl = noTrail.replace(/[\x00-\x1f]/g, '');
    try { return JSON.parse(noCtrl); } catch(e) {}
    return null;
  }

    return 'あなたはBAR Musashiの伝説のバーテンダーです。お客様の感情を読み取りレパートリー豊かでホスピタリティ溢れるカクテルを専門とする落ち着いた雰囲気のバーです。\n' +
      '「' + name + '」様のお名前からインスピレーションを受けた、世界に一つだけのオリジナルカクテルを考案してください。一度芸能人やアニメのキャラクターに同じ名前はいないかをチェック。その後知名度が高い同姓同名はその芸能人やアニメのキャラクターをレシピの参考に文章にも加える。レシピは幅広く考案。和から洋まで幅広く考案しクラシックカクテルやモダンカクテルいろいろなレシピを参考にしツイスト。ジャパニーズウイスキーに頼りすぎずスコッチやバーボン、カナディアンまで幅広く考案\n\n' +
      '■ルール：\n' +
      '- 名前の音、漢字の意味、イメージ、語感から連想を広げる。名前からの連想を最優先とする\n' +
      '- 材料は分量（ml/tsp等）付きで、プロが実際に作れるレシピにする\n' +
      '- スピリッツ・ウイスキーは銘柄名を使わず種類で表記する（例：「ジャパニーズウイスキー」「ドライジン」「ライウイスキー」）\n' +
      '- リキュール・スピリッツは一般的なスタンダードカクテルで使われるものは全般使用可能\n' +
      '- フレッシュフルーツは以下のみ使用可能：' + FRUITS_LIST + '\n' +
      '- 当店の自家製素材（使用可能）：' + HOUSE_SPECIALS + '\n' +
      '- 当店のスピリッツ在庫リスト（使用可能）：' + SPIRITS_LIST + '\n' +
      '- 当店のリキュール在庫リスト（使用可能）：' + LIQUOR_LIST + '\n' +
      '- 入手困難な材料を使う場合は必ず代替案を含める\n' +
      '- 人柄補正：名前の印象が強い・硬い場合はほんの少し柔らかさを加え、柔らかい・優しい印象の名前にはほんの少し芯や深みを足す。「その人が心地よいバランス」を目指す\n' +
      '- descriptionはバーテンダーがお客様に語りかけるような口調で、名前の由来や音の印象からカクテルへの着想、味わいの変化や飲み進める楽しみまで丁寧に語る（150〜250字）\n\n' +
      '重要：改行せず1行のJSONのみ返してください。コードブロックや説明文は含めないこと。\n' +
      '{"cocktailName":"英語名","cocktailNameJP":"日本語名","ingredients":["材料1(分量)","材料2","材料3","材料4"],"glassType":"グラス","method":"Shaken/Stirred/Built/Blended","flavorProfile":"味わいの説明（40-60字）","description":"名前との繋がり・ストーリー（150-250字、バーテンダーが語りかける口調）","garnish":"ガーニッシュ"}';
  }

  function generate() {
    var name = nameInput.value.trim();
    var key = apiKeyInput.value.trim();
    if (!name || !key || isLoading) return;

    isLoading = true;
    updateBtn();
    genBtn.textContent = '創作中…';
    show(loadingEl);
    hide(errorEl);
    hide(cardEl);

    var xhr = new XMLHttpRequest();
    xhr.open('POST', 'https://api.anthropic.com/v1/messages', true);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.setRequestHeader('x-api-key', key);
    xhr.setRequestHeader('anthropic-version', '2023-06-01');
    xhr.setRequestHeader('anthropic-dangerous-direct-browser-access', 'true');
    xhr.timeout = 60000;

    xhr.onload = function() {
      try {
        if (xhr.status !== 200) {
          var errDetail = '';
          try { errDetail = JSON.parse(xhr.responseText).error.message; } catch(e) {}
          throw new Error(errDetail || 'API Error ' + xhr.status);
        }
        var data = JSON.parse(xhr.responseText);
        var text = (data.content || []).map(function(b) { return b.text || ''; }).join('').trim();
        if (!text) throw new Error('空のレスポンスでした');
        var parsed = safeParseJSON(text);
        if (!parsed) throw new Error('JSON解析エラー。もう一度お試しください。');
        if (!parsed.cocktailName) throw new Error('不完全なレスポンス');
        if (!Array.isArray(parsed.ingredients)) parsed.ingredients = [];
        renderCard(name, parsed);
        historyData.unshift({ name: name, cocktail: parsed.cocktailName });
        if (historyData.length > 12) historyData.length = 12;
        renderHistory();
        setTimeout(function() { cardEl.scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 150);
      } catch(e) {
        errorMsg.textContent = e.message || 'エラーが発生しました';
        show(errorEl);
      }
      done();
    };

    xhr.onerror = function() {
      errorMsg.textContent = '通信エラー。ネットワーク接続を確認してください。';
      show(errorEl);
      done();
    };

    xhr.ontimeout = function() {
      errorMsg.textContent = 'タイムアウト。もう一度お試しください。';
      show(errorEl);
      done();
    };

    xhr.send(JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1024,
      messages: [{ role: 'user', content: buildPrompt(name) }]
    }));

    function done() {
      isLoading = false;
      genBtn.textContent = 'Create';
      hide(loadingEl);
      updateBtn();
    }
  }

  function renderCard(name, c) {
    cardEl.className = 'card';
    cardEl.innerHTML =
      '<div class="shimmer"></div>' +
      '<div class="corner tl"></div><div class="corner br"></div>' +
      '<p class="card-for">A cocktail crafted for</p>' +
      '<p class="card-name">' + esc(name) + ' 様</p>' +
      '<h2 class="cocktail-name">' + esc(c.cocktailName) + '</h2>' +
      '<p class="cocktail-jp">' + esc(c.cocktailNameJP || '') + '</p>' +
      '<div class="card-div"></div>' +
      '<p class="sec-title">Ingredients</p>' +
      '<ul class="ing-list">' + (c.ingredients || []).map(function(i) { return '<li class="ing-tag">' + esc(i) + '</li>'; }).join('') + '</ul>' +
      '<div class="card-div"></div>' +
      '<p class="sec-title">Flavor Profile</p>' +
      '<p class="desc">' + esc(c.flavorProfile || '') + '</p>' +
      '<div class="card-div"></div>' +
      '<div class="glass-row">' +
        '<div class="meta-item"><span class="meta-label">Glass</span><span class="meta-val">' + esc(c.glassType || '') + '</span></div>' +
        '<div class="meta-item"><span class="meta-label">Method</span><span class="meta-val">' + esc(c.method || '') + '</span></div>' +
      '</div>' +
      (c.garnish ? '<p class="garnish"><span class="garnish-icon">◆</span>' + esc(c.garnish) + '</p>' : '') +
      '<div class="card-div"></div>' +
      '<p class="sec-title">Story</p>' +
      '<p class="desc">' + esc(c.description || '') + '</p>';
    show(cardEl);
  }

  function renderHistory() {
    if (!historyData.length) { hide(historyEl); return; }
    historyEl.innerHTML =
      '<p class="hist-title">Tonight\'s Creations</p>' +
      historyData.map(function(h) {
        return '<div class="hist-item" data-name="' + esc(h.name) + '">' +
          '<span class="hist-name">' + esc(h.name) + ' 様</span>' +
          '<span class="hist-cocktail">' + esc(h.cocktail) + '</span></div>';
      }).join('');
    historyEl.querySelectorAll('.hist-item').forEach(function(el) {
      el.addEventListener('click', function() {
        nameInput.value = el.getAttribute('data-name');
        updateBtn();
      });
    });
    show(historyEl);
  }

  function esc(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }
})();
</script>
</body>
</html>
